name: Actions App CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SERVER_PORT: ${{ vars.SERVER_PORT }}
      SPRING_PROFILES_ACTIVE: ${{ secrets.APP_ENV }}
    steps:
      - run: echo ${{ secrets.APP_ENV }}
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-package: "jdk"
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build
        run: mvn clean package -DskipTests

      - name: Save files
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: target/

      - name: Failed build
        uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'CI failed on ${{ github.ref_name }}',
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })

      - name: Success build
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open'
            })
            for (const issue of issues.data){
              if (issue.title.includes('CI failed')){
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                })
              }
            }


  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    env:
      SERVER_PORT: ${{ vars.SERVER_PORT }}
      SPRING_PROFILES_ACTIVE: ${{ secrets.APP_ENV }}
    steps:
      - run: echo ${{ secrets.APP_ENV }}
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-java${{ matrix.java }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Download builded app
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: target/

      - name: Run tests
        run: mvn test
